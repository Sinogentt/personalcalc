<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Cost Calculator</title>
  <style>
    body {
      font-family: "Aptos Narrow", sans-serif;
      font-size: small;
      background-color: #1E3A5F;
      color: #ffffff;
      text-align: center;
    }
    .title {
      font-family: "Aptos Display", sans-serif;
      font-size: 28px;
      color: #ffffff;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    #jsResults {
      background: #ffffff;
      color: #000;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1 class="title">My Personal Calc</h1>
  <h2 class="title">Cost Calculator</h2>

  <div>
    <input type="number" id="usdInput" placeholder="Enter USD Amount">
    <input type="number" id="weightInput" value="1" hidden>
    <br>
    <button onclick="calculate()">Calculate</button>
  </div>

  <div id="jsResults" hidden>
    <p><strong>USD × 6.709 :</strong> <span id="ttdResult"></span></p>
    <p><strong>Freight and Insurance Charge:</strong> <span id="tableResult"></span></p>
    <p><strong>Service Fee 35%:</strong> <span id="percentResult"></span></p>
    <p><strong>Flat Fee +10:</strong> <span id="flatFeeResult"></span></p>
    <hr>
    <p><strong><big>Total:</big></strong> <span id="totalResult" style="font-weight:bold;"></span></p>
  </div>

  <script>
    function getFreightPrice(usd) {
      return 34.55 + (usd - 1) * 3;
    }

    function calculate() {
      const usd = parseFloat(document.getElementById("usdInput").value);
      const weight = parseInt(document.getElementById("weightInput").value);

      if (isNaN(usd)) {
        alert("Please enter a valid USD amount.");
        return;
      }

      const ttd = usd * 6.709;
      document.getElementById("ttdResult").textContent = ttd.toFixed(2);

      const freight = getFreightPrice(usd);
      document.getElementById("tableResult").textContent = freight.toFixed(2);

      const subtotal = ttd + freight;
      const percentFee = subtotal * 0.35;
      document.getElementById("percentResult").textContent = percentFee.toFixed(2);

      const flatFee = 10;
      document.getElementById("flatFeeResult").textContent = flatFee.toFixed(2);

      const total = subtotal + percentFee + flatFee;
      document.getElementById("totalResult").textContent = total.toFixed(2);

      document.getElementById("jsResults").hidden = false;
    }
  </script>

  <script src="https://static.app/js/static.js" type="text/javascript"></script>
</body>
</html>
